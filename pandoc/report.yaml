from: markdown
standalone: true
toc: false
toc-depth: 4
number-sections: true
citeproc: true
template: pandoc/templates/eisvogel.tex
pdf-engine: xelatex

resource-path:
  - .
  - report
  - report/assets

variables:
  graphics: true
  multirow: true
  header-includes:
    - \AtBeginEnvironment{longtable}{\scriptsize\setlength{\tabcolsep}{3pt}}
    - \AtBeginEnvironment{tabular}{\scriptsize\setlength{\tabcolsep}{3pt}}
    - \usepackage{seqsplit}
    - \let\OldTexttt\texttt
    - \renewcommand{\texttt}[1]{\OldTexttt{\seqsplit{#1}}}

bibliography:
  - report/bibliography/references.bib

csl: pandoc/csl/apa-7.csl
